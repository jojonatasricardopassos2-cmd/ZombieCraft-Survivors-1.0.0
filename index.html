
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <title>ZumbiCraft Survival</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='80' cy='100' r='80' fill='%23e53935'/%3E%3Cg transform='translate(100, 30)'%3E%3Crect x='0' y='0' width='80' height='120' fill='%232e7d32' stroke='black' stroke-width='8'/%3E%3Crect x='20' y='40' width='20' height='8' fill='black'/%3E%3Crect x='34' y='40' width='6' height='8' fill='%23b71c1c'/%3E%3Cpath d='M 20 90 L 50 90 L 50 100 L 20 100 Z' fill='black'/%3E%3C/g%3E%3C/svg%3E" />
    
    <style>
      html, body { width: 100%; height: 100%; margin: 0; padding: 0; }
      body { overflow: hidden; background-color: #000; touch-action: none; }
      #root { width: 100%; height: 100%; }
      canvas { display: block; image-rendering: pixelated; }
      /* Disable selection for game UI */
      .no-select { user-select: none; -webkit-user-select: none; }
      @keyframes slideInRight {
          0% { transform: translateX(100%); opacity: 0; }
          10% { transform: translateX(0); opacity: 1; }
          90% { transform: translateX(0); opacity: 1; }
          100% { transform: translateX(100%); opacity: 0; }
      }
      .animate-toast {
          animation: slideInRight 5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      }
    </style>
  

</head>
  <body>
    <div id="root"></div>
    
  <script type="module" src="/index.tsx"></script>
</body>
</html>
